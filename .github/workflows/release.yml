name: Release

on:
  push:
    tags:
      - "*"

env:
  RUST_BACKTRACE: 1

jobs:
  github-release:
    name: "Create GitHub Release"
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.VERSION }}
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Get the version
        id: get_version
        run: echo "VERSION=${GITHUB_REF/refs\/tags\//}" >> $GITHUB_OUTPUT

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ${{ contains(steps.get_version.outputs.VERSION, 'canary') }}; then
            gh release create ${{ steps.get_version.outputs.VERSION }} \
              --prerelease \
              --title "${{ steps.get_version.outputs.VERSION }}" \
              --notes "Release ${{ steps.get_version.outputs.VERSION }}"
          else
            gh release create ${{ steps.get_version.outputs.VERSION }} \
              --title "${{ steps.get_version.outputs.VERSION }}" \
              --notes "Release ${{ steps.get_version.outputs.VERSION }}"
          fi

  build-prebuilt:
    name: "Build prebuilt (${{ matrix.target }})"
    needs: github-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: ubuntu-24.04_x86_64
            os: ubuntu-24.04
          - target: ubuntu-24.04_arm64
            os: ubuntu-24.04-arm
          - target: ubuntu-22.04_x86_64
            os: ubuntu-22.04
          - target: ubuntu-22.04_arm64
            os: ubuntu-22.04-arm
          - target: macos_arm64
            os: macos-15
          - target: windows_x86_64
            os: windows-2025
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - run: rustup update stable

      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential meson ninja-build nasm

      - name: Install build dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install meson nasm

      - name: Install build dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          pip install meson
          choco install ninja nasm -y
          echo "C:\Program Files\NASM" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build with source-build
        run: cargo build --release --features source-build

      - name: Find OUT_DIR
        id: find_out_dir
        shell: bash
        run: |
          OUT_DIR=$(find target/release/build/shiguredo_dav1d-*/out -maxdepth 0 -type d 2>/dev/null | head -1)
          echo "OUT_DIR=${OUT_DIR}" >> $GITHUB_OUTPUT

      - name: Create prebuilt archive
        shell: bash
        run: |
          OUT_DIR="${{ steps.find_out_dir.outputs.OUT_DIR }}"
          SRC_DIR="$OUT_DIR/build/dav1d/build/src"
          mkdir -p staging/lib
          # 全プラットフォームで libdav1d.a に統一する
          if [ -f "$SRC_DIR/libdav1d.a" ]; then
            cp "$SRC_DIR/libdav1d.a" staging/lib/
          elif [ -f "$SRC_DIR/dav1d.lib" ]; then
            cp "$SRC_DIR/dav1d.lib" staging/lib/libdav1d.a
          fi
          cp "$OUT_DIR/bindings.rs" staging/
          tar czf dav1d-${{ matrix.target }}.tar.gz -C staging .

      - name: Generate SHA256 checksum
        shell: bash
        run: |
          if command -v sha256sum &> /dev/null; then
            sha256sum dav1d-${{ matrix.target }}.tar.gz > dav1d-${{ matrix.target }}.tar.gz.sha256
          else
            shasum -a 256 dav1d-${{ matrix.target }}.tar.gz > dav1d-${{ matrix.target }}.tar.gz.sha256
          fi

      - name: Upload prebuilt archive
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload ${{ needs.github-release.outputs.version }} \
            dav1d-${{ matrix.target }}.tar.gz \
            dav1d-${{ matrix.target }}.tar.gz.sha256 \
            --clobber

  publish:
    needs: [github-release, build-prebuilt]
    runs-on: ubuntu-24.04
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  slack_notify:
    needs: [github-release, build-prebuilt, publish]
    timeout-minutes: 20
    runs-on: ubuntu-slim
    if: ${{ always() }}
    permissions:
      actions: read
    steps:
      - name: Slack Notification
        uses: shiguredo/github-actions/.github/actions/slack-notify@main
        with:
          status: ${{ job.status }}
          slack_webhook: ${{ secrets.SLACK_WEBHOOK }}
          slack_channel: rust-oss
          notify_mode: failure_and_fixed
